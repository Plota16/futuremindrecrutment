<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Box Office — Entity Relationship Diagram</title>
<style>
  :root{
    --txt:#1a1a18; --txt2:#6b6a64; --line:#8a8980;
    --bg:#ffffff; --surface:#ffffff;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{ --txt:#e9e8e3; --txt2:#a3a299; --line:#7d7c74; --bg:#1a1a18; --surface:#26261f; }
  }
  html,body{background:var(--bg);margin:0}
  body{padding:26px 22px 40px;font-family:var(--sans);color:var(--txt)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
  h1{font-size:17px;font-weight:750;margin:0 0 10px}
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;align-items:center;margin:0 0 18px;font-size:12px;color:var(--txt2)}
  .legend i{width:11px;height:11px;border-radius:3px;display:inline-block;vertical-align:-1px;margin-right:5px}
  .tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.3px;padding:1px 4px;border-radius:4px;line-height:1.5}
  .scroll{overflow-x:auto;padding-bottom:8px}
  /* row height = font(10.5px) * line-height(1.4) + padding(3px) ≈ 18px → use 19px
     header height = font(12px) * 1.3 + padding(12px) + border(1px) ≈ 30px
     ul padding = 3px top + 3px bottom
     entity height = 30 + 3 + N*19 + 3 = 36 + N*19
     f for row i  = (30 + 3 + i*19 + 9.5) / (36 + N*19)  =  (42.5 + i*19) / (36 + N*19) */
  #canvas{position:relative;width:1200px;height:625px}
  #canvas svg{position:absolute;inset:0;width:1200px;height:625px;z-index:0;pointer-events:none}
  .ent{position:absolute;z-index:1;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface);
       box-shadow:0 1px 3px rgba(0,0,0,.08)}
  .ent .h{padding:6px 9px;font-size:12px;font-weight:750;letter-spacing:.2px;border-bottom:1px solid var(--line);white-space:nowrap}
  .ent ul{list-style:none;margin:0;padding:3px 0}
  .ent li{display:flex;align-items:center;gap:4px;padding:1.5px 9px;font-size:10.5px;font-family:var(--mono);color:var(--txt)}
  .ent li .nm{white-space:nowrap}
  .ent li.pk .nm{font-weight:700;text-decoration:underline;text-underline-offset:2px}
  .ent li .t-pk{background:#FAEEDA;color:#412402;flex-shrink:0}
  .ent li .t-fk{background:#E6F1FB;color:#042C53;flex-shrink:0}
  .ent li .spacer{width:18px;flex:0 0 18px}
  .ent li .ty{margin-left:auto;font-size:8.5px;color:var(--txt2);padding-left:6px;white-space:nowrap}
</style>
</head>
<body>
<h2 class="sr-only">Entity relationship diagram of a box-office star schema: two fact tables, eight dimensions and four bridge tables, linked by crow's-foot one-to-many relationships.</h2>
<h1>Box Office Data Warehouse — ER Diagram</h1>
<div class="legend">
  <span><i style="background:#FAECE7"></i>Fact</span>
  <span><i style="background:#E1F5EE"></i>Dimension</span>
  <span><i style="background:#F1EFE8"></i>Bridge</span>
  <span style="opacity:.45">|</span>
  <span><span class="tag t-pk">PK</span> primary key</span>
  <span><span class="tag t-fk">FK</span> foreign key</span>
  <span style="opacity:.45">|</span>
  <span style="font-size:11px;color:var(--txt2);font-family:var(--mono)">type<span style="opacity:.55">?</span> = nullable</span>
</div>
<div class="scroll"><div id="canvas"><svg id="links" viewBox="0 0 1200 625"></svg></div></div>
<script>
(function(){
  var HEAD={fact:{bg:'#FAECE7',fg:'#4A1B0C'},dim:{bg:'#E1F5EE',fg:'#04342C'},bridge:{bg:'#F1EFE8',fg:'#2C2C2A'}};

  /* a(name, keys, type)  — keys: null | 'PK' | 'FK' | 'PK FK'
     type: SQLite-style, '?' suffix = nullable                    */
  function a(n,k,ty){return {n:n,k:k||null,ty:ty||null};}

  /* f(i, N) — fractional position of row i (0-based) in an N-row entity
     header≈30px  ul-pad=3px  row≈19px
     centre of row i = 30+3 + i*19 + 9.5 = 42.5 + i*19
     entity height   = 30+3 + N*19 + 3   = 36   + N*19            */
  function f(i,N){return (42.5+i*19)/(36+N*19);}

  var E={
    /* ── left column: date / distributor / rating-source ───────── */
    DIM_DATE:{kind:'dim',x:0,y:30,w:200,attrs:[
      a('DATE_ID',  'PK','int'),
      a('FULL_DATE',null,'date'),
      a('IS_WEEKEND',null,'bool'),
      a('IS_HOLIDAY',null,'bool'),
      a('HOLIDAY_NAME',null,'text?'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    DIM_DISTRIBUTOR:{kind:'dim',x:0,y:228,w:200,attrs:[
      a('DISTRIBUTOR_ID','PK','int'),
      a('DISTRIBUTOR_NAME',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    DIM_RATING_SOURCE:{kind:'dim',x:0,y:360,w:200,attrs:[
      a('SOURCE_ID','PK','int'),
      a('SOURCE_NAME',null,'text'),
      a('SCALE_MAX',null,'int'),
      a('SCALE_UNIT',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},

    /* ── fact tables ─────────────────────────────────────────────── */
    FACT_DAILY_REVENUE:{kind:'fact',x:240,y:40,w:235,attrs:[
      a('DATE_ID',       'PK FK','int'),
      a('MOVIE_ID',      'PK FK','int'),
      a('DISTRIBUTOR_ID','FK',   'int'),
      a('REVENUE',       null,   'int?'),
      a('THEATERS',      null,   'int?'),
      a('LOAD_TIMESTAMP',null,   'datetime')
    ]},
    FACT_MOVIE_RATING:{kind:'fact',x:240,y:308,w:235,attrs:[
      a('MOVIE_ID',            'PK FK','int'),
      a('SOURCE_ID',           'PK FK','int'),
      a('SNAPSHOT_DATE_ID',    'PK FK','int'),
      a('RATING_VALUE_NATIVE', null,   'real'),
      a('VOTES',               null,   'int?'),
      a('LOAD_TIMESTAMP',      null,   'datetime')
    ]},

    /* ── dim_movie ───────────────────────────────────────────────── */
    DIM_MOVIE:{kind:'dim',x:515,y:195,w:215,attrs:[
      a('MOVIE_ID',      'PK', 'int'),
      a('TITLE',         null, 'text'),
      a('RELEASED_DATE', null, 'date?'),
      a('RUNTIME_MIN',   null, 'int?'),
      a('PLOT',          null, 'text?'),
      a('LOAD_TIMESTAMP',null, 'datetime')
    ]},

    /* ── bridge tables ───────────────────────────────────────────── */
    BRIDGE_MOVIE_GENRE:{kind:'bridge',x:785,y:80,w:220,attrs:[
      a('MOVIE_ID', 'PK FK','int'),
      a('GENRE_ID', 'PK FK','int'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    BRIDGE_MOVIE_PERSON:{kind:'bridge',x:785,y:210,w:220,attrs:[
      a('MOVIE_ID',   'PK FK','int'),
      a('PERSON_ID',  'PK FK','int'),
      a('CREDIT_ROLE','PK',   'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    BRIDGE_MOVIE_LANGUAGE:{kind:'bridge',x:785,y:375,w:220,attrs:[
      a('MOVIE_ID',    'PK FK','int'),
      a('LANGUAGE_ID', 'PK FK','int'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    BRIDGE_MOVIE_COUNTRY:{kind:'bridge',x:785,y:495,w:220,attrs:[
      a('MOVIE_ID',   'PK FK','int'),
      a('COUNTRY_ID', 'PK FK','int'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},

    /* ── right-column dims ───────────────────────────────────────── */
    DIM_GENRE:{kind:'dim',x:1020,y:85,w:178,attrs:[
      a('GENRE_ID',  'PK','int'),
      a('GENRE_NAME',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    DIM_PERSON:{kind:'dim',x:1020,y:215,w:178,attrs:[
      a('PERSON_ID',  'PK','int'),
      a('PERSON_NAME',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    DIM_LANGUAGE:{kind:'dim',x:1020,y:380,w:178,attrs:[
      a('LANGUAGE_ID',  'PK','int'),
      a('LANGUAGE_NAME',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]},
    DIM_COUNTRY:{kind:'dim',x:1020,y:500,w:178,attrs:[
      a('COUNTRY_ID',  'PK','int'),
      a('COUNTRY_NAME',null,'text'),
      a('LOAD_TIMESTAMP',null,'datetime')
    ]}
  };

  /* ── relations ────────────────────────────────────────────────────
     f values computed by the f(row, totalRows) formula above so that
     each arrowhead lands on the exact FK / PK attribute row.
     DIM_MOVIE right-side lines fan across the PK row neighbourhood
     (all ≤ f(1,6)=0.41) to avoid 4 lines leaving the same pixel.  */
  var R=[
    /* DIM_DATE.DATE_ID ─────────────────────────── */
    {one:{id:'DIM_DATE',           side:'right',f:f(0,6)},
     many:{id:'FACT_DAILY_REVENUE',side:'left', f:f(0,6)}},
    {one:{id:'DIM_DATE',           side:'right',f:f(0,6)},
     many:{id:'FACT_MOVIE_RATING', side:'left', f:f(2,6)}},

    /* DIM_DISTRIBUTOR.DISTRIBUTOR_ID ────────────── */
    {one:{id:'DIM_DISTRIBUTOR',    side:'right',f:f(0,3)},
     many:{id:'FACT_DAILY_REVENUE',side:'left', f:f(2,6)}},

    /* DIM_RATING_SOURCE.SOURCE_ID ───────────────── */
    {one:{id:'DIM_RATING_SOURCE',  side:'right',f:f(0,5)},
     many:{id:'FACT_MOVIE_RATING', side:'left', f:f(1,6)}},

    /* DIM_MOVIE.MOVIE_ID → facts (left side, fan) ─ */
    {one:{id:'DIM_MOVIE',          side:'left', f:f(0,6)-0.04},
     many:{id:'FACT_DAILY_REVENUE',side:'right',f:f(1,6)}},
    {one:{id:'DIM_MOVIE',          side:'left', f:f(0,6)+0.04},
     many:{id:'FACT_MOVIE_RATING', side:'right',f:f(0,6)}},

    /* DIM_MOVIE.MOVIE_ID → bridges (right side, fan across PK row) */
    {one:{id:'DIM_MOVIE',           side:'right',f:f(0,6)-0.06},
     many:{id:'BRIDGE_MOVIE_GENRE', side:'left', f:f(0,3)}},
    {one:{id:'DIM_MOVIE',           side:'right',f:f(0,6)},
     many:{id:'BRIDGE_MOVIE_PERSON',side:'left', f:f(0,4)}},
    {one:{id:'DIM_MOVIE',           side:'right',f:f(0,6)+0.06},
     many:{id:'BRIDGE_MOVIE_LANGUAGE',side:'left',f:f(0,3)}},
    {one:{id:'DIM_MOVIE',           side:'right',f:f(0,6)+0.12},
     many:{id:'BRIDGE_MOVIE_COUNTRY', side:'left',f:f(0,3)}},

    /* right-column dims → bridges ────────────────── */
    {one:{id:'DIM_GENRE',   side:'left',f:f(0,3)},
     many:{id:'BRIDGE_MOVIE_GENRE',    side:'right',f:f(1,3)}},
    {one:{id:'DIM_PERSON',  side:'left',f:f(0,3)},
     many:{id:'BRIDGE_MOVIE_PERSON',   side:'right',f:f(1,4)}},
    {one:{id:'DIM_LANGUAGE',side:'left',f:f(0,3)},
     many:{id:'BRIDGE_MOVIE_LANGUAGE', side:'right',f:f(1,3)}},
    {one:{id:'DIM_COUNTRY', side:'left',f:f(0,3)},
     many:{id:'BRIDGE_MOVIE_COUNTRY',  side:'right',f:f(1,3)}}
  ];

  /* ── render entities ─────────────────────────────────────────── */
  var canvas=document.getElementById('canvas');
  function build(id){
    var e=E[id], h=HEAD[e.kind];
    var li=e.attrs.map(function(at){
      var tag='<span class="spacer"></span>';
      if(at.k){
        tag=at.k.split(' ').map(function(k){
          return '<span class="tag '+(k==='PK'?'t-pk':'t-fk')+'">'+k+'</span>';
        }).join('');
      }
      var isPk=at.k&&at.k.indexOf('PK')>-1;
      var tySpan=at.ty?'<span class="ty">'+at.ty+'</span>':'';
      return '<li class="'+(isPk?'pk':'')+'">'+tag+'<span class="nm">'+at.n+'</span>'+tySpan+'</li>';
    }).join('');
    var d=document.createElement('div');
    d.className='ent'; d.id='ent-'+id;
    d.style.left=e.x+'px'; d.style.top=e.y+'px'; d.style.width=e.w+'px';
    d.innerHTML='<div class="h" style="background:'+h.bg+';color:'+h.fg+'">'+id+'</div><ul>'+li+'</ul>';
    canvas.appendChild(d);
  }
  Object.keys(E).forEach(build);

  /* ── render lines ────────────────────────────────────────────── */
  var NS='http://www.w3.org/2000/svg', svg=document.getElementById('links');
  function normal(side){
    return side==='left'?[-1,0]:side==='right'?[1,0]:side==='top'?[0,-1]:[0,1];
  }
  function anchor(id,side,fv){
    var el=document.getElementById('ent-'+id);
    var x=el.offsetLeft,y=el.offsetTop,w=el.offsetWidth,hh=el.offsetHeight;
    if(side==='left')  return [x,       y+fv*hh];
    if(side==='right') return [x+w,     y+fv*hh];
    if(side==='top')   return [x+fv*w,  y];
    return                    [x+fv*w,  y+hh];
  }
  function ln(x1,y1,x2,y2){
    var l=document.createElementNS(NS,'line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke','var(--line)');l.setAttribute('stroke-width','1.4');
    svg.appendChild(l);
  }
  function crow(p,side){
    var n=normal(side),px=-n[1],py=n[0];
    var ax=p[0]+n[0]*15,ay=p[1]+n[1]*15,s=7;
    ln(ax,ay,p[0],p[1]);
    ln(ax,ay,p[0]+px*s,p[1]+py*s);
    ln(ax,ay,p[0]-px*s,p[1]-py*s);
  }
  function one(p,side){
    var n=normal(side),px=-n[1],py=n[0];
    var cx=p[0]+n[0]*10,cy=p[1]+n[1]*10,s=7;
    ln(cx+px*s,cy+py*s,cx-px*s,cy-py*s);
  }
  R.forEach(function(r){
    var pa=anchor(r.one.id, r.one.side, r.one.f);
    var pb=anchor(r.many.id,r.many.side,r.many.f);
    var na=normal(r.one.side),nb=normal(r.many.side);
    ln(pa[0]+na[0]*10,pa[1]+na[1]*10, pb[0]+nb[0]*15,pb[1]+nb[1]*15);
    one(pa,r.one.side);
    crow(pb,r.many.side);
  });
})();
</script>
</body>
</html>
