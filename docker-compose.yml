services:
  api:
    build: .
    image: box-office-api
    ports:
      - "8000:8000"
    environment:
      OMDB_API_KEY: ${OMDB_API_KEY:-}
    volumes:
      - ./data:/app/data        # persist warehouse.db across runs
    restart: unless-stopped

  dashboard:
    image: box-office-api
    pull_policy: never
    depends_on:
      - api
    command:
      - streamlit
      - run
      - box_office/gold/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data        # read the same warehouse.db the api writes
    restart: unless-stopped
